<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>localStorage</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Контактна книга</h1>
        
        <form id="contact-form">
            <input type="text" id="contact-name" placeholder="Ім'я контакту" required>

            <input type="text" id="contact-id" placeholder="ID" required>

        </form>

        <ul id="contact-list"></ul>
    </div>

    <script src="script.js"></script>
</body>
</html>
