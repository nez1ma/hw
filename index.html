<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Контактна книга з Toast</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="toast-container"></div>

    <div class="container">
        <h1>Контактна книга</h1>
        
        <form id="contact-form">
            <input type="text" id="contact-name" placeholder="Ім'я контакту">
            <input type="tel" id="contact-phone" placeholder="Номер телефону">
            <input type="text" id="contact-id" placeholder="ID">
            <button type="submit" id="add-btn">Додати</button>
        </form>

        <ul id="contact-list"></ul>
    </div>

    <script src="script.js"></script>
</body>
</html>
